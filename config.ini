# Gothic Plus Mod Settings
#
# Lines starting with # are comments and are ignored.
# Edit the values after the = sign, then save this file and press Ctrl+R
# in-game (or restart the game) for the changes to take effect.

# Regeneration Settings

# Turn health regeneration on or off (true or false).
health_regen_enabled = true

# Percent of MaxHealth restored per second (1 = 1% of MaxHealth per second).
health_percent_per_tick = 1

# Turn mana regeneration on or off (true or false).
mana_regen_enabled = true

# Percent of MaxMana restored per second (1 = 1% of MaxMana per second).
mana_percent_per_tick = 1


# Sleep Settings

# Sleeping restores HP/mana based on hours slept, but the game also tracks a
# "rested" budget that depletes with each sleep and only refills slowly over
# time; once depleted, further sleeps restore nothing regardless of hours
# chosen. Setting this to true resets that budget to full after every sleep,
# so a long-enough sleep always restores fully no matter how recently you
# last slept. The per-hour restore amount itself is unaffected.
sleep_remove_recently_slept_penalty = true


